<div class="pagination">
  <div class="pagination-left">
    <span class="pagination-info">
      Page <strong>{{ currentPage() }}</strong> of <strong>{{ totalPages() }}</strong>
    </span>
  </div>

  <div class="pagination-center">
    <button class="page-btn" [disabled]="currentPage() === 1" (click)="onPrevPage()"><</button>

    <div class="pagination-current">
      {{ currentPage() }}
    </div>

    <button class="page-btn" [disabled]="currentPage() === totalPages()" (click)="onNextPage()">
      >
    </button>
  </div>

  <div class="pagination-right">
    <span class="per-page-label">Results per page:</span>

    <select class="per-page-select" [value]="pageSize()" (change)="onPageSizeChange($event)">
      <option [value]="10">10</option>
      <option [value]="30">30</option>
      <option [value]="50">50</option>
    </select>
  </div>
</div>
