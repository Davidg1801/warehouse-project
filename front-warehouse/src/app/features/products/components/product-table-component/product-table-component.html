<div class="page">
  <div class="product-table">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Category</th>
          <th>Quantity</th>
          <th>Price</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (product of products(); track product.uuid) {
          <tr>
            <td>{{ product.name }}</td>
            <td>{{ product.categoryName }}</td>
            <td>
              <span class="stock-badge">
                {{ product.quantity }}
              </span>
            </td>
            <td>{{ product.price | currency }}</td>
            <td>
              <button class="button-action" [routerLink]="['/products', product.uuid, 'edit']">
                <svg xmlns="http://www.w3.org/2000/svg" class="icon-action edit">
                  <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                  <path
                    d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"
                  />
                </svg>
              </button>
              <button class="button-action" (click)="delete.emit(product.uuid)">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="icon-action trash"
                  viewBox="0 0 24 24"
                >
                  <path d="M10 11v6" />
                  <path d="M14 11v6" />
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                  <path d="M3 6h18" />
                  <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                </svg>
              </button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="6">No products found</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
