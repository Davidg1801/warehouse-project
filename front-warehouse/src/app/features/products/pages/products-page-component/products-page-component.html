<div class="products-page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Inventory Management</h1>
      <p class="page-subtitle">Manage products, stock levels and categories</p>
    </div>
    <div class="header-actions">
      <button class="add-btn" [routerLink]="['/products/create']">✚ Add new product</button>
    </div>
  </div>
  <app-product-filters-component
    [categories]="categories()"
    [currentFilters]="activeFilters()"
    (filtersChanged)="onFiltersChanged($event)"
  />
  <app-product-table-component [products]="productsVm()" (delete)="onDeleteProduct($event)" />
  <div class="table-meta">Showing {{ productsVm().length }} of {{ totalCount() }} results</div>
  <app-product-pagination-component
    [currentPage]="pageNumber()"
    [totalPages]="totalPages()"
    [pageSize]="pageSize()"
    (pageChanged)="onPageChanged($event)"
    (pageSizeChanged)="onPageSizeChanged($event)"
  />
</div>
