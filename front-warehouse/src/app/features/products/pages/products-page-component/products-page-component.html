<div class="products-page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Inventory Management</h1>
      <p class="page-subtitle">Manage products, stock levels and categories</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-add" [routerLink]="['/products/create']">✚ Add new product</button>
      <button class="btn btn-refresh">↻ Refresh</button>
    </div>
  </div>
  <app-product-filters-component [categories]="categories()" />
  <app-product-table-component [products]="products()" />
</div>
