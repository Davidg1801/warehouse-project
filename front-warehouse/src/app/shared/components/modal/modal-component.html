<dialog #dialogElement (cancel)="close()">
  <div class="modal-container" [ngClass]="'modal-' + modalService.config().variant || 'primary'">
    <div class="modal-header">
      <h3 class="modal-title">{{ modalService.config().title }}</h3>
    </div>

    <div class="modal-body">
      <p class="modal-text">{{ modalService.config().message }}</p>
    </div>

    <div class="modal-footer">
      <button class="btn cancel-btn" (click)="close()">
        {{ modalService.config().cancelLabel || 'Cancel' }}
      </button>
      <button class="btn confirm-btn" (click)="confirm()">
        {{ modalService.config().confirmLabel || 'OK' }}
      </button>
    </div>
  </div>
</dialog>
